<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI防诈 - 答题</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #eaffd0 0%, #d6f5ff 100%);
            color: #2d5a27;
            padding: 20px;
        }

        .back-btn {
            padding: 12px 26px;
            background: linear-gradient(135deg, #27ae60, #219653);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 40px;
            box-shadow: 0 6px 16px rgba(39, 174, 96, 0.3);
            transition: 0.3s ease;
        }
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(39, 174, 96, 0.4);
        }

        .game-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 40px;
            margin-top: 40px;
        }

        .img-item {
            text-align: center;
            width: 300px;
        }

        .img-box {
            width: 300px;
            height: 300px;
            border: 3px dashed #72c060;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #2d5a27;
            margin-bottom: 20px;
            background: #ffffff;
            border-radius: 12px;
        }

        .choose-btn {
            padding: 14px 30px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 6px 16px rgba(46, 204, 113, 0.3);
            transition: 0.3s ease;
        }
        .choose-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.4);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-content {
            background: white;
            padding: 36px;
            border-radius: 16px;
            text-align: center;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .modal-img {
            width: 100px;
            height: 100px;
            border: 2px dashed #72c060;
            margin: 24px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2d5a27;
            border-radius: 8px;
        }

        .modal-btn {
            margin: 10px;
            padding: 11px 28px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }
        .modal-btn:hover {
            transform: translateY(-2px);
        }

        .next-btn {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }
        .home-btn {
            background: linear-gradient(135deg, #7f8c8d, #636e70);
            color: white;
        }
        .restart-btn {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
        }

        /* 手机适配 */
        @media (max-width: 768px) {
            .img-item {
                width: 85vw;
            }
            .img-box {
                width: 100%;
                height: 60vw;
            }
            .game-container {
                gap: 24px;
            }
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="location.href='index.html'">← 返回主页</button>

    <div class="game-container">
        <div class="img-item">
            <div id="img1" class="img-box">加载图片中...</div>
            <button class="choose-btn" onclick="checkAnswer(1)">这是AI</button>
        </div>
        <div class="img-item">
            <div id="img2" class="img-box">加载图片中...</div>
            <button class="choose-btn" onclick="checkAnswer(2)">这是AI</button>
        </div>
    </div>

    <div id="correctModal" class="modal">
        <div class="modal-content">
            <h2>✅ 恭喜你，回答正确！</h2>
            <div class="modal-img"><img src="5.png" style="width:100%;height:100%;object-fit:cover;"></div>
            <button class="modal-btn next-btn" onclick="nextQuestion()">下一题</button>
        </div>
    </div>

    <div id="wrongModal" class="modal">
        <div class="modal-content">
            <h2>❌ 回答错误，请再试试！</h2>
            <div class="modal-img"><img src="6.png" style="width:100%;height:100%;object-fit:cover;"></div>
            <button class="modal-btn next-btn" onclick="nextQuestion()">下一题</button>
        </div>
    </div>

    <div id="resultModal" class="modal">
        <div class="modal-content">
            <h2>📊 游戏结束</h2>
            <h3 id="scoreText">总分：0分,正确：0题</h3>
            <button class="modal-btn home-btn" onclick="location.href='index.html'">返回主页</button>
            <button class="modal-btn restart-btn" onclick="restartGame()">重新开始</button>
        </div>
    </div>

<script>
    // ========== 图片数量配置，根据你文件夹实际数量修改 ==========
    const AI_COUNT = 30;
    const AI_SUFFIX = ".png";
    const NOAI_COUNT = 30;
    const NOAI_SUFFIX = ".png";
    const MAX_QUESTION = 10; // 一轮10题
    // ==========================================================

    // 自动生成图片数组，无需后端读取文件夹
    const aiImages = [];
    const realImages = [];
    for(let i = 1; i <= AI_COUNT; i++){
        aiImages.push(i + AI_SUFFIX);
    }
    for(let i = 1; i <= NOAI_COUNT; i++){
        realImages.push(i + NOAI_SUFFIX);
    }

    let usedAIIndices = [];
    let usedRealIndices = [];
    let currentAnswer = 0;
    let questionCount = 0;
    let score = 0;

    window.onload = generateQuestion;

    function getUnusedIndex(totalCount, usedIndices) {
        let available = [];
        for (let i = 0; i < totalCount; i++) {
            if (!usedIndices.includes(i)) available.push(i);
        }
        if (available.length === 0) {
            usedIndices.length = 0;
            available = Array.from({length: totalCount}, (_, i) => i);
        }
        const randomIndex = Math.floor(Math.random() * available.length);
        const selected = available[randomIndex];
        usedIndices.push(selected);
        return selected;
    }

    function generateQuestion() {
        questionCount++;
        const aiIndex = getUnusedIndex(aiImages.length, usedAIIndices);
        const realIndex = getUnusedIndex(realImages.length, usedRealIndices);
        const aiPic = "ai/" + aiImages[aiIndex];
        const realPic = "noai/" + realImages[realIndex];

        const isLeftAI = Math.random() > 0.5;
        if (isLeftAI) {
            currentAnswer = 1;
            document.getElementById("img1").innerHTML = `<img src="${aiPic}" style="width:100%;height:100%;object-fit:cover;">`;
            document.getElementById("img2").innerHTML = `<img src="${realPic}" style="width:100%;height:100%;object-fit:cover;">`;
        } else {
            currentAnswer = 2;
            document.getElementById("img1").innerHTML = `<img src="${realPic}" style="width:100%;height:100%;object-fit:cover;">`;
            document.getElementById("img2").innerHTML = `<img src="${aiPic}" style="width:100%;height:100%;object-fit:cover;">`;
        }
    }

    function checkAnswer(choose) {
        if (choose === currentAnswer) {
            score++;
            document.getElementById("correctModal").style.display = "flex";
        } else {
            document.getElementById("wrongModal").style.display = "flex";
        }
    }

    function nextQuestion() {
        document.querySelectorAll(".modal").forEach(m => m.style.display = "none");
        if (questionCount >= MAX_QUESTION) {
            document.getElementById("scoreText").innerText = `一共${MAX_QUESTION}题，答对${score}题，得${score}分`;
            document.getElementById("resultModal").style.display = "flex";
            return;
        }
        generateQuestion();
    }

    function restartGame() {
        questionCount = 0;
        score = 0;
        usedAIIndices = [];
        usedRealIndices = [];
        document.querySelectorAll(".modal").forEach(m => m.style.display = "none");
        generateQuestion();
    }
</script>
</body>
</html>

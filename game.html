<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI防诈 - 答题</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #eaffd0 0%, #d6f5ff 100%);
            color: #2d5a27;
            padding: 20px;
        }

        .back-btn {
            padding: 12px 26px;
            background: linear-gradient(135deg, #27ae60, #219653);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 40px;
            box-shadow: 0 6px 16px rgba(39, 174, 96, 0.3);
            transition: 0.3s ease;
        }
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(39, 174, 96, 0.4);
        }

        .game-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 40px;
            margin-top: 40px;
        }

        .img-item {
            text-align: center;
            width: 300px;
        }

        .img-box {
            width: 300px;
            height: 300px;
            border: 3px dashed #72c060;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #2d5a27;
            margin-bottom: 20px;
            background: #f8ffe8;
            border-radius: 12px;
            overflow: hidden;
            transform: translateZ(0);
            will-change: opacity;
            position: relative;
        }
        /* 骨架加载动画 */
        .img-box::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, #e6f9d8 25%, #d0efbc 50%, #e6f9d8 75%);
            background-size: 200% 100%;
            animation: skeleton 1.5s infinite;
            display: none;
        }
        .img-box.loading::after {
            display: block;
        }
        @keyframes skeleton {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.3s ease;
            decoding: async;
        }
        .img-box img.loaded {
            opacity: 1;
        }

        .choose-btn {
            padding: 14px 30px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 6px 16px rgba(46, 204, 113, 0.3);
            transition: 0.3s ease;
        }
        .choose-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.4);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-content {
            background: white;
            padding: 36px;
            border-radius: 16px;
            text-align: center;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .modal-img {
            width: 100px;
            height: 100px;
            border: 2px dashed #72c060;
            margin: 24px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2d5a27;
            border-radius: 8px;
            overflow: hidden;
        }
        .modal-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            decoding: async;
        }

        .modal-btn {
            margin: 10px;
            padding: 11px 28px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }
        .modal-btn:hover {
            transform: translateY(-2px);
        }

        .next-btn {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }
        .home-btn {
            background: linear-gradient(135deg, #7f8c8d, #636e70);
            color: white;
        }
        .restart-btn {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
        }

        /* 手机适配 */
        @media (max-width: 768px) {
            .img-item {
                width: 85vw;
            }
            .img-box {
                width: 100%;
                height: 60vw;
            }
            .game-container {
                gap: 24px;
            }
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="location.href='index.html'">← 返回主页</button>

    <div class="game-container">
        <div class="img-item">
            <div id="img1" class="img-box">加载图片中...</div>
            <button class="choose-btn" onclick="checkAnswer(1)">这是AI</button>
        </div>
        <div class="img-item">
            <div id="img2" class="img-box">加载图片中...</div>
            <button class="choose-btn" onclick="checkAnswer(2)">这是AI</button>
        </div>
    </div>

    <div id="correctModal" class="modal">
        <div class="modal-content">
            <h2>✅ 恭喜你，回答正确！</h2>
            <div class="modal-img"><img src="5.jpg"></div>
            <button class="modal-btn next-btn" onclick="nextQuestion()">下一题</button>
        </div>
    </div>

    <div id="wrongModal" class="modal">
        <div class="modal-content">
            <h2>❌ 回答错误，请再试试！</h2>
            <div class="modal-img"><img src="6.jpg"></div>
            <button class="modal-btn next-btn" onclick="nextQuestion()">下一题</button>
        </div>
    </div>

    <div id="resultModal" class="modal">
        <div class="modal-content">
            <h2>📊 游戏结束</h2>
            <h3 id="scoreText">总分：0分,正确：0题</h3>
            <button class="modal-btn home-btn" onclick="location.href='index.html'">返回主页</button>
            <button class="modal-btn restart-btn" onclick="restartGame()">重新开始</button>
        </div>
    </div>

<script>
    // ========== 图片配置：全部改为jpg ==========
    const AI_COUNT = 25;
    const AI_SUFFIX = ".jpg";
    const NOAI_COUNT = 25;
    const NOAI_SUFFIX = ".jpg";
    const MAX_QUESTION = 5;
    // ==========================================================

    const aiImages = [];
    const realImages = [];
    for(let i = 1; i <= AI_COUNT; i++) aiImages.push(i + AI_SUFFIX);
    for(let i = 1; i <= NOAI_COUNT; i++) realImages.push(i + NOAI_SUFFIX);

    // 全局永久图片缓存，线上不重复请求网络
    const imageCache = new Map();
    // 预加载下一题缓存
    let nextImagePair = null;

    let usedAIIndices = [];
    let usedRealIndices = [];
    let currentAnswer = 0;
    let questionCount = 0;
    let score = 0;

    window.addEventListener('DOMContentLoaded', async () => {
        await generateQuestion();
        // 当前题目渲染完成，后台预加载下一题图片
        preloadNextImages();
    });

    // 获取未使用随机下标
    function getUnusedIndex(totalCount, usedIndices) {
        const allIndex = Array.from({length: totalCount}, (_, i) => i);
        let unusedList = allIndex.filter(x => !usedIndices.includes(x));
        if(unusedList.length === 0) {
            usedIndices.length = 0;
            unusedList = [...allIndex];
        }
        const randomIdx = Math.floor(Math.random() * unusedList.length);
        const selectIdx = unusedList[randomIdx];
        usedIndices.push(selectIdx);
        return selectIdx;
    }

    // 加载图片，命中缓存直接返回，不发起网络请求
    function loadImage(src) {
        return new Promise((resolve, reject) => {
            if(imageCache.has(src)) {
                resolve(imageCache.get(src));
                return;
            }
            const img = new Image();
            img.decoding = "async";
            img.onload = () => {
                imageCache.set(src, img);
                resolve(img);
            };
            img.onerror = () => reject(`缺失：${src}`);
            img.src = src;
        });
    }

    // 弹窗间隙后台预加载下一组图片，切换题目无等待
    async function preloadNextImages() {
        if(questionCount >= MAX_QUESTION) return;
        const aiIndex = getUnusedIndex(aiImages.length, [...usedAIIndices]);
        const realIndex = getUnusedIndex(realImages.length, [...usedRealIndices]);
        const aiSrc = "ai/" + aiImages[aiIndex];
        const realSrc = "noai/" + realImages[realIndex];
        const isLeftAI = Math.random() > 0.5;
        nextImagePair = {
            left: isLeftAI ? aiSrc : realSrc,
            right: isLeftAI ? realSrc : aiSrc,
            ans: isLeftAI ? 1 : 2
        };
        // 静默后台加载，不阻塞页面交互
        Promise.all([loadImage(nextImagePair.left), loadImage(nextImagePair.right)]);
    }

    // 渲染图片容器，显示骨架加载动画
    async function renderBox(boxId, src) {
        const box = document.getElementById(boxId);
        box.classList.add("loading");
        box.innerHTML = "加载图片中...";
        try {
            const cachedImg = await loadImage(src);
            cachedImg.className = "loaded";
            box.innerHTML = "";
            box.appendChild(cachedImg);
        } catch (err) {
            box.innerText = err;
        } finally {
            box.classList.remove("loading");
        }
    }

    // 生成题目，优先复用预加载缓存图片
    async function generateQuestion() {
        questionCount++;
        if(!aiImages.length || !realImages.length){
            document.getElementById("img1").innerText = "ai文件夹缺少图片文件";
            document.getElementById("img2").innerText = "noai文件夹缺少图片文件";
            return;
        }

        // 有预加载数据直接使用，无需重新下载
        if(nextImagePair) {
            currentAnswer = nextImagePair.ans;
            await Promise.all([
                renderBox("img1", nextImagePair.left),
                renderBox("img2", nextImagePair.right)
            ]);
            nextImagePair = null;
            return;
        }

        // 无预加载则现场并行加载两张图
        const aiIndex = getUnusedIndex(aiImages.length, usedAIIndices);
        const realIndex = getUnusedIndex(realImages.length, usedRealIndices);
        const aiSrc = "ai/" + aiImages[aiIndex];
        const realSrc = "noai/" + realImages[realIndex];

        const isLeftAI = Math.random() > 0.5;
        if (isLeftAI) {
            currentAnswer = 1;
            await Promise.all([renderBox("img1", aiSrc), renderBox("img2", realSrc)]);
        } else {
            currentAnswer = 2;
            await Promise.all([renderBox("img1", realSrc), renderBox("img2", aiSrc)]);
        }
    }

    // 选择答案弹窗逻辑
    function checkAnswer(choose) {
        if (choose === currentAnswer) {
            score++;
            document.getElementById("correctModal").style.display = "flex";
        } else {
            document.getElementById("wrongModal").style.display = "flex";
        }
    }

    // 切换下一题
    async function nextQuestion() {
        document.querySelectorAll(".modal").forEach(m => m.style.display = "none");
        if (questionCount >= MAX_QUESTION) {
            document.getElementById("scoreText").innerText = `一共${MAX_QUESTION}题，答对${score}题，得${score}分`;
            document.getElementById("resultModal").style.display = "flex";
            return;
        }
        await generateQuestion();
        preloadNextImages();
    }

    // 重新开局重置数据
    async function restartGame() {
        questionCount = 0;
        score = 0;
        usedAIIndices = [];
        usedRealIndices = [];
        nextImagePair = null;
        document.querySelectorAll(".modal").forEach(m => m.style.display = "none");
        await generateQuestion();
        preloadNextImages();
    }
</script>
</body>
</html>

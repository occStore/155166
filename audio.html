<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI防诈 - 音频识别</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #eaffd0 0%, #d6f5ff 100%);
            color: #2d5a27;
            padding: 20px;
        }

        .back-btn {
            padding: 12px 26px;
            background: linear-gradient(135deg, #27ae60, #219653);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 40px;
            box-shadow: 0 6px 16px rgba(39, 174, 96, 0.3);
            transition: 0.3s ease;
        }
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(39, 174, 96, 0.4);
        }

        .game-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 40px;
            margin-top: 40px;
        }

        .audio-item {
            text-align: center;
            width: 300px;
        }

        .audio-box {
            width: 300px;
            height: 300px;
            border: 3px dashed #72c060;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap:20px;
            font-size: 18px;
            color: #2d5a27;
            margin-bottom: 20px;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            /* 硬件加速优化卡顿 */
            transform: translateZ(0);
            will-change: contents;
        }

        .choose-btn {
            padding: 14px 30px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 6px 16px rgba(46, 204, 113, 0.3);
            transition: 0.3s ease;
        }
        .choose-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.4);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-content {
            background: white;
            padding: 36px;
            border-radius: 16px;
            text-align: center;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .modal-media {
            width: 100px;
            height: 100px;
            border: 2px dashed #72c060;
            margin: 24px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2d5a27;
            border-radius: 8px;
        }

        .modal-btn {
            margin: 10px;
            padding: 11px 28px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }
        .modal-btn:hover {
            transform: translateY(-2px);
        }

        .next-btn {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }
        .home-btn {
            background: linear-gradient(135deg, #7f8c8d, #636e70);
            color: white;
        }
        .restart-btn {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
        }

        /* 手机适配 */
        @media (max-width: 768px) {
            .audio-item {
                width: 85vw;
            }
            .audio-box {
                width: 100%;
                height: 60vw;
            }
            .game-container {
                gap: 24px;
            }
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="location.href='index.html'">← 返回主页</button>

    <div class="game-container">
        <div class="audio-item">
            <div id="aud1" class="audio-box">暂无音频文件</div>
            <button class="choose-btn" onclick="checkAnswer(1)">音频一是AI音频</button>
        </div>
        <div class="audio-item">
            <div id="aud2" class="audio-box">暂无音频文件</div>
            <button class="choose-btn" onclick="checkAnswer(2)">音频二是AI音频</button>
        </div>
    </div>

    <!-- 答对弹窗 -->
    <div id="correctModal" class="modal">
        <div class="modal-content">
            <h2>✅ 恭喜你，回答正确！</h2>
            <div class="modal-media"><img src="5.png" style="width:100%;height:100%;object-fit:cover;"></div>
            <button class="modal-btn next-btn" onclick="nextQuestion()">下一题</button>
        </div>
    </div>

    <!-- 答错弹窗 -->
    <div id="wrongModal" class="modal">
        <div class="modal-content">
            <h2>❌ 回答错误，请再试试！</h2>
            <div class="modal-media"><img src="6.png" style="width:100%;height:100%;object-fit:cover;"></div>
            <button class="modal-btn next-btn" onclick="nextQuestion()">下一题</button>
        </div>
    </div>

    <!-- 结算弹窗 -->
    <div id="resultModal" class="modal">
        <div class="modal-content">
            <h2>📊 音频识别游戏结束</h2>
            <h3 id="scoreText">总分：0分,正确：0题</h3>
            <button class="modal-btn home-btn" onclick="location.href='index.html'">返回主页</button>
            <button class="modal-btn restart-btn" onclick="restartGame()">重新开始</button>
        </div>
    </div>

<script>
    // ========== 音频素材数量配置 ==========
    const AUDIO_AI_COUNT = 5;
    const AUDIO_REAL_COUNT = 5;
    const AUDIO_SUFFIX = ".mp3";
    const MAX_QUESTION = 3; // 音频一轮3题
    // ======================================================

    // 生成音频文件名数组
    const aiAudioList = [];
    const realAudioList = [];
    for(let i = 1; i <= AUDIO_AI_COUNT; i++){
        aiAudioList.push(i + AUDIO_SUFFIX);
    }
    for(let i = 1; i <= AUDIO_REAL_COUNT; i++){
        realAudioList.push(i + AUDIO_SUFFIX);
    }

    // 音频缓存，解决切换卡顿
    const audioCache = {};

    let usedAiIdx = [];
    let usedRealIdx = [];
    let targetLeftIsAI = false; // true=左边是AI音频，正确选项1；false=右边是AI，正确选项2
    let questionNum = 0;
    let score = 0;

    window.onload = renderAudio;

    function getUnusedIndex(total, usedArr) {
        if(total === 1) return 0;
        let arr = [];
        for(let i=0;i<total;i++) arr.push(i);
        if(arr.every(item => usedArr.includes(item))){
            usedArr.length = 0;
        }
        let filter = arr.filter(x => !usedArr.includes(x));
        let rand = Math.floor(Math.random() * filter.length);
        let res = filter[rand];
        usedArr.push(res);
        return res;
    }

    // 缓存音频工具
    function getCacheAudioHtml(src) {
        if (!audioCache[src]) {
            const tempAudio = new Audio(src);
            audioCache[src] = true;
        }
        // 移除多余文字，只保留audio播放器
        return `<audio src="${src}" controls preload="auto" muted playsinline onerror="this.parentElement.innerText='音频文件缺失'">`;
    }

    function renderAudio() {
        questionNum++;
        if(aiAudioList.length === 0 || realAudioList.length === 0){
            document.getElementById("aud1").innerText = "audio/ai 暂无音频文件";
            document.getElementById("aud2").innerText = "audio/noai 暂无音频文件";
            return;
        }
        let aiIdx = getUnusedIndex(aiAudioList.length, usedAiIdx);
        let realIdx = getUnusedIndex(realAudioList.length, usedRealIdx);
        let aiSrc = "audio/ai/" + aiAudioList[aiIdx];
        let realSrc = "audio/noai/" + realAudioList[realIdx];

        // 随机AI音频在左/右
        targetLeftIsAI = Math.random() > 0.5;
        if(targetLeftIsAI){
            // 左AI，右真实
            document.getElementById("aud1").innerHTML = getCacheAudioHtml(aiSrc);
            document.getElementById("aud2").innerHTML = getCacheAudioHtml(realSrc);
        }else{
            // 左真实，右AI
            document.getElementById("aud1").innerHTML = getCacheAudioHtml(realSrc);
            document.getElementById("aud2").innerHTML = getCacheAudioHtml(aiSrc);
        }
    }

    // 判断答案：1=音频一是AI，2=音频二是AI
    function checkAnswer(select) {
        const correctOption = targetLeftIsAI ? 1 : 2;
        if(select === correctOption){
            score++;
            document.getElementById("correctModal").style.display = "flex";
        }else{
            document.getElementById("wrongModal").style.display = "flex";
        }
    }

    function nextQuestion() {
        document.querySelectorAll(".modal").forEach(m => m.style.display = "none");
        if(questionNum >= MAX_QUESTION){
            document.getElementById("scoreText").innerText = `一共${MAX_QUESTION}题，答对${score}题，得${score}分`;
            document.getElementById("resultModal").style.display = "flex";
            return;
        }
        renderAudio();
    }

    function restartGame() {
        questionNum = 0;
        score = 0;
        usedAiIdx = [];
        usedRealIdx = [];
        document.querySelectorAll(".modal").forEach(m => m.style.display = "none");
        renderAudio();
    }
</script>
</body>
</html>
